version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: marketplace_db
    environment:
      POSTGRES_DB: marketplace_db
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./../sql/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d marketplace_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.47.7
    container_name: marketplace_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_NAME: metabase
      MB_DB_USER: metabase
      MB_DB_PASSWORD: metabase_pass
      MB_JETTY_PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped

volumes:
  pgdata:
  metabase-data: